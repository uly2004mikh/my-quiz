<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивный опросник</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        /* Прогресс-бар */
        .progress-bar {
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
            height: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .progress-fill {
            background: #4CAF50;
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 10px;
        }
        
        .stats {
            text-align: center;
            color: white;
            margin-bottom: 15px;
            font-size: 14px;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            font-size: 2em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .questions-wrapper {
            min-height: 400px;
        }
        
        .question-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            /* Убираем анимацию, которая может вызывать скачки */
            transition: none;
        }
        
        .question-text {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        
        .question-image {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin: 15px 0;
            background: #f0f0f0; /* Фон пока грузится */
            display: block;
        }
        
        .options {
            margin: 15px 0;
        }
        
        .option {
            background: #f8f9fa;
            padding: 12px 15px;
            margin: 8px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s ease;
            border: 1px solid #e0e0e0;
        }
        
        .option:hover {
            background: #e9ecef;
            transform: translateX(3px);
        }
        
        .option.selected {
            background: #4CAF50;
            color: white;
            border-color: #45a049;
        }
        
        .submit-btn {
            display: block;
            width: 100%;
            padding: 15px;
            font-size: 1.1em;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 20px;
        }
        
        .submit-btn:hover {
            opacity: 0.9;
        }
        
        .result-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
        }
        
        .score {
            font-size: 2.5em;
            font-weight: bold;
            color: #4CAF50;
            margin: 15px 0;
        }
        
        .percentage {
            font-size: 1.2em;
            color: #666;
        }
        
        /* Защита от копирования */
        img {
            pointer-events: none;
        }
        
        /* Загрузка */
        .skeleton {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .skeleton-text {
            height: 30px;
            background: #e0e0e0;
            margin-bottom: 15px;
            border-radius: 5px;
        }
        
        .skeleton-image {
            height: 200px;
            background: #e0e0e0;
            margin: 15px 0;
            border-radius: 10px;
        }
        
        .skeleton-option {
            height: 45px;
            background: #e0e0e0;
            margin: 8px 0;
            border-radius: 10px;
        }
        
        /* Адаптивность */
        @media (max-width: 600px) {
            .question-text {
                font-size: 1.1em;
            }
            
            h1 {
                font-size: 1.5em;
            }
            
            .option {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Опросник</h1>
        
        <div class="stats" id="stats">
            Отвечено: <span id="answered-count">0</span> / <span id="total-count">0</span>
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        
        <div class="questions-wrapper" id="questions-container">
            <!-- Скелетон загрузки -->
            <div class="skeleton">
                <div class="skeleton-text"></div>
                <div class="skeleton-image"></div>
                <div class="skeleton-option"></div>
                <div class="skeleton-option"></div>
                <div class="skeleton-option"></div>
                <div class="skeleton-option"></div>
            </div>
        </div>
        
        <button class="submit-btn" id="submit-btn" style="display: none;">📊 Отправить ответы</button>
        
        <div id="result-container"></div>
    </div>

    <script>
        // ЗАЩИТА ОТ КОПИРОВАНИЯ
        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            return false;
        });
        
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && ['c', 'v', 'p'].includes(e.key)) {
                e.preventDefault();
                return false;
            }
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
                e.preventDefault();
                return false;
            }
        });
        
        // ДАННЫЕ ОПРОСНИКА
        const questions = [
            {
                id: 1,
                text: "Какой язык программирования самый популярный в 2024 году?",
                image: "https://placehold.co/600x200/667eea/white?text=Python",
                options: ["Python", "JavaScript", "Java", "C++"],
                correct: 0
            },
            {
                id: 2,
                text: "Что означает аббревиатура HTML?",
                image: "https://placehold.co/600x200/764ba2/white?text=HTML",
                options: [
                    "Hyper Text Markup Language",
                    "High Tech Modern Language",
                    "Hyper Transfer Markup Language",
                    "Home Tool Markup Language"
                ],
                correct: 0
            },
            {
                id: 3,
                text: "Какой фреймворк используется для создания веб-приложений на Python?",
                image: "https://placehold.co/600x200/ff6b6b/white?text=Django",
                options: ["React", "Vue.js", "Django", "Spring"],
                correct: 2
            }
        ];
        
        let userAnswers = {};
        
        // Обновляем общее количество
        document.getElementById('total-count').textContent = questions.length;
        
        // Оптимизированное отображение вопросов
        function displayQuestions() {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';
            
            // Используем DocumentFragment для оптимизации
            const fragment = document.createDocumentFragment();
            
            questions.forEach((question, index) => {
                const questionCard = document.createElement('div');
                questionCard.className = 'question-card';
                questionCard.setAttribute('data-question-id', question.id);
                
                const questionText = document.createElement('div');
                questionText.className = 'question-text';
                questionText.textContent = `${index + 1}. ${question.text}`;
                questionCard.appendChild(questionText);
                
                // Картинка с обработкой загрузки
                const img = document.createElement('img');
                img.className = 'question-image';
                img.alt = 'Изображение к вопросу';
                img.loading = 'lazy'; // Ленивая загрузка
                
                // Показываем заглушку пока грузится
                img.style.background = '#f0f0f0';
                img.onload = function() {
                    this.style.background = 'none';
                };
                img.src = question.image;
                
                questionCard.appendChild(img);
                
                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options';
                
                question.options.forEach((option, optIndex) => {
                    const optionDiv = document.createElement('div');
                    optionDiv.className = 'option';
                    optionDiv.textContent = option;
                    optionDiv.setAttribute('data-option-index', optIndex);
                    
                    optionDiv.addEventListener('click', () => {
                        // Убираем выделение у всех
                        const allOptions = optionsDiv.querySelectorAll('.option');
                        allOptions.forEach(opt => opt.classList.remove('selected'));
                        optionDiv.classList.add('selected');
                        userAnswers[question.id] = optIndex;
                        updateProgress();
                    });
                    
                    optionsDiv.appendChild(optionDiv);
                });
                
                questionCard.appendChild(optionsDiv);
                fragment.appendChild(questionCard);
            });
            
            container.appendChild(fragment);
        }
        
        // Обновление прогресса
        function updateProgress() {
            const answered = Object.keys(userAnswers).length;
            const total = questions.length;
            const percentage = (answered / total) * 100;
            
            document.getElementById('answered-count').textContent = answered;
            document.getElementById('progress-fill').style.width = percentage + '%';
            
            const submitBtn = document.getElementById('submit-btn');
            if (answered === total) {
                submitBtn.style.display = 'block';
            } else {
                submitBtn.style.display = 'none';
            }
        }
        
        // Подсчет результатов
        function calculateResults() {
            let correctCount = 0;
            const results = [];
            
            questions.forEach(question => {
                const userAnswer = userAnswers[question.id];
                const isCorrect = userAnswer !== undefined && userAnswer === question.correct;
                if (isCorrect) correctCount++;
                
                results.push({
                    question: question.text,
                    userAnswer: userAnswer !== undefined ? question.options[userAnswer] : 'Не отвечен',
                    correctAnswer: question.options[question.correct],
                    isCorrect: isCorrect
                });
            });
            
            return {
                correct: correctCount,
                total: questions.length,
                percentage: (correctCount / questions.length * 100).toFixed(1),
                details: results
            };
        }
        
        // Показ результатов
        function showResults() {
            const results = calculateResults();
            const resultContainer = document.getElementById('result-container');
            
            const container = document.getElementById('questions-container');
            container.style.opacity = '0.6';
            container.style.pointerEvents = 'none';
            document.getElementById('submit-btn').style.display = 'none';
            
            let detailsHtml = '<div style="margin-top: 20px; text-align: left; border-top: 2px solid #eee; padding-top: 20px;">';
            detailsHtml += '<h3>📋 Детальный разбор:</h3>';
            
            results.details.forEach((item, idx) => {
                detailsHtml += `
                    <div style="margin: 10px 0; padding: 10px; background: ${item.isCorrect ? '#e8f5e9' : '#ffebee'}; border-radius: 8px; font-size: 14px;">
                        <strong>${idx + 1}. ${item.question}</strong><br>
                        <span style="color: ${item.isCorrect ? '#4CAF50' : '#f44336'}">
                            ${item.isCorrect ? '✅ Правильно' : '❌ Неправильно'}
                        </span>
                        ${!item.isCorrect ? `<br><span style="color: #666;">Правильный ответ: ${item.correctAnswer}</span>` : ''}
                    </div>
                `;
            });
            detailsHtml += '</div>';
            
            resultContainer.innerHTML = `
                <div class="result-card">
                    <h2>🎉 Ваш результат 🎉</h2>
                    <div class="score">${results.correct} / ${results.total}</div>
                    <div class="percentage">${results.percentage}% правильных ответов</div>
                    <div style="margin: 15px 0; font-size: 1.1em;">
                        ${getResultMessage(results.percentage)}
                    </div>
                    ${detailsHtml}
                    <div style="margin-top: 20px;">
                        <button onclick="location.reload()" style="
                            margin: 5px;
                            padding: 10px 20px;
                            background: #4CAF50;
                            color: white;
                            border: none;
                            border-radius: 5px;
                            cursor: pointer;
                        ">🔄 Пройти снова</button>
                    </div>
                </div>
            `;
        }
        
        function getResultMessage(percentage) {
            if (percentage >= 90) return "🌟 Отлично! Ты настоящий эксперт! 🌟";
            if (percentage >= 70) return "👍 Хороший результат! Так держать! 👍";
            if (percentage >= 50) return "📚 Неплохо, но есть куда расти! 📚";
            return "💪 Не расстраивайся! Попробуй еще раз! 💪";
        }
        
        // Обработчик кнопки отправки
        document.getElementById('submit-btn').addEventListener('click', () => {
            if (Object.keys(userAnswers).length !== questions.length) {
                alert('Пожалуйста, ответьте на все вопросы!');
                return;
            }
            showResults();
        });
        
        // Запуск
        setTimeout(() => {
            displayQuestions();
        }, 100);
    </script>
</body>
</html>
