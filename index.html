<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивный опросник</title>
    <style>
        /* Весь твой CSS остается таким же, как был */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .progress-bar {
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
            height: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .progress-fill {
            background: #4CAF50;
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 10px;
        }
        
        .stats {
            text-align: center;
            color: white;
            margin-bottom: 15px;
            font-size: 14px;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            font-size: 2em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .question-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .question-text {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }
        
        .question-image {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin: 15px 0;
            background: #f0f0f0;
            display: block;
        }
        
        .options {
            margin: 15px 0;
        }
        
        .option {
            background: #f8f9fa;
            padding: 12px 15px;
            margin: 8px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s ease;
            border: 1px solid #e0e0e0;
        }
        
        .option:hover {
            background: #e9ecef;
            transform: translateX(3px);
        }
        
        .option.selected {
            background: #4CAF50;
            color: white;
            border-color: #45a049;
        }
        
        .submit-btn {
            display: block;
            width: 100%;
            padding: 15px;
            font-size: 1.1em;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .submit-btn:hover {
            opacity: 0.9;
        }
        
        .result-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
        }
        
        .score {
            font-size: 2.5em;
            font-weight: bold;
            color: #4CAF50;
            margin: 15px 0;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        img {
            pointer-events: none;
        }
        
        @media (max-width: 600px) {
            .question-text {
                font-size: 1.1em;
            }
            h1 {
                font-size: 1.5em;
            }
            .option {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Опросник</h1>
        
        <div class="stats">
            Отвечено: <span id="answered-count">0</span> / <span id="total-count">0</span>
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        
        <div id="questions-container"></div>
        
        <button class="submit-btn" id="submit-btn" style="display: none;">📊 Отправить ответы</button>
        
        <div id="result-container"></div>
    </div>

    <script>
        // ЗАЩИТА ОТ КОПИРОВАНИЯ
        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            return false;
        });
        
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && ['c', 'v', 'p'].includes(e.key)) {
                e.preventDefault();
                return false;
            }
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
                e.preventDefault();
                return false;
            }
        });
        
        // ========== ТВОИ ВОПРОСЫ ==========
        const questions = [
            {
                id: 1,
                text: "Какой язык программирования самый популярный?",
                image: "https://placehold.co/600x200/667eea/white?text=Python",
                options: ["Python", "JavaScript", "Java", "C++"],
                correct: 0
            },
            {
                id: 2,
                text: "Что означает HTML?",
                image: "https://placehold.co/600x200/764ba2/white?text=HTML",
                options: [
                    "Hyper Text Markup Language",
                    "High Tech Modern Language",
                    "Hyper Transfer Markup Language",
                    "Home Tool Markup Language"
                ],
                correct: 0
            },
            {
                id: 3,
                text: "Какой фреймворк для Python?",
                image: "https://placehold.co/600x200/ff6b6b/white?text=Django",
                options: ["React", "Vue.js", "Django", "Spring"],
                correct: 2
            }
        ];
        
        // ========== НАСТРОЙКИ ДЛЯ GOOGLE SHEETS ==========
        // ВСТАВЬ СЮДА СВОЮ ССЫЛКУ ИЗ GOOGLE FORMS
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/ТВОЙ_ИД/exec";
        
        document.getElementById('total-count').textContent = questions.length;
        let userAnswers = {};
        
        function displayQuestions() {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';
            
            questions.forEach((question, index) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                
                const text = document.createElement('div');
                text.className = 'question-text';
                text.textContent = `${index + 1}. ${question.text}`;
                card.appendChild(text);
                
                const img = document.createElement('img');
                img.className = 'question-image';
                img.src = question.image;
                img.alt = 'Изображение';
                card.appendChild(img);
                
                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options';
                
                question.options.forEach((option, optIndex) => {
                    const optionDiv = document.createElement('div');
                    optionDiv.className = 'option';
                    optionDiv.textContent = option;
                    optionDiv.onclick = () => {
                        optionsDiv.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
                        optionDiv.classList.add('selected');
                        userAnswers[question.id] = optIndex;
                        updateProgress();
                    };
                    optionsDiv.appendChild(optionDiv);
                });
                
                card.appendChild(optionsDiv);
                container.appendChild(card);
            });
        }
        
        function updateProgress() {
            const answered = Object.keys(userAnswers).length;
            const percent = (answered / questions.length) * 100;
            document.getElementById('answered-count').textContent = answered;
            document.getElementById('progress-fill').style.width = percent + '%';
            document.getElementById('submit-btn').style.display = answered === questions.length ? 'block' : 'none';
        }
        
        function calculateResults() {
            let correct = 0;
            let answers = [];
            questions.forEach(q => {
                const isCorrect = userAnswers[q.id] === q.correct;
                if (isCorrect) correct++;
                answers.push({
                    question: q.text,
                    userAnswer: q.options[userAnswers[q.id]] || "Не отвечен",
                    correctAnswer: q.options[q.correct],
                    isCorrect: isCorrect
                });
            });
            return { 
                correct, 
                total: questions.length, 
                percent: (correct / questions.length * 100).toFixed(1),
                answers: answers
            };
        }
        
        // ОТПРАВКА В GOOGLE SHEETS
        async function saveToGoogleSheets(result) {
            try {
                const data = {
                    timestamp: new Date().toLocaleString('ru-RU'),
                    score: `${result.correct}/${result.total}`,
                    percentage: result.percent + '%',
                    answers: JSON.stringify(result.answers)
                };
                
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                console.log('Результаты сохранены!');
                return true;
            } catch (error) {
                console.error('Ошибка сохранения:', error);
                return false;
            }
        }
        
        async function showResults() {
            const res = calculateResults();
            
            // Показываем загрузку
            const submitBtn = document.getElementById('submit-btn');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = '📤 Сохранение результатов...';
            submitBtn.disabled = true;
            
            // Сохраняем в Google Таблицу
            await saveToGoogleSheets(res);
            
            // Восстанавливаем кнопку и показываем результат
            submitBtn.style.display = 'none';
            document.getElementById('questions-container').style.opacity = '0.6';
            
            document.getElementById('result-container').innerHTML = `
                <div class="result-card">
                    <h2>🎉 Ваш результат 🎉</h2>
                    <div class="score">${res.correct} / ${res.total}</div>
                    <div class="percentage">${res.percent}% правильных ответов</div>
                    <p style="margin: 15px 0; color: #666;">✨ Результат сохранен! ✨</p>
                    <button onclick="location.reload()" style="margin-top:20px;padding:10px 20px;background:#4CAF50;color:white;border:none;border-radius:5px;cursor:pointer;">🔄 Пройти снова</button>
                </div>
            `;
        }
        
        document.getElementById('submit-btn').onclick = () => {
            if (Object.keys(userAnswers).length !== questions.length) {
                alert('Ответьте на все вопросы!');
                return;
            }
            showResults();
        };
        
        displayQuestions();
    </script>
</body>
</html>
