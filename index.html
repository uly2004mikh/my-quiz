<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивный опросник</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .progress-bar {
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
            height: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .progress-fill {
            background: #4CAF50;
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 10px;
        }
        
        .stats {
            text-align: center;
            color: white;
            margin-bottom: 15px;
            font-size: 14px;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            font-size: 2em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .question-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .question-text {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }
        
        .question-image {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin: 15px 0;
            background: #f0f0f0;
            display: block;
        }
        
        .options {
            margin: 15px 0;
        }
        
        .option {
            background: #f8f9fa;
            padding: 12px 15px;
            margin: 8px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s ease;
            border: 1px solid #e0e0e0;
        }
        
        .option:hover {
            background: #e9ecef;
            transform: translateX(3px);
        }
        
        .option.selected {
            background: #4CAF50;
            color: white;
            border-color: #45a049;
        }
        
        .submit-btn {
            display: block;
            width: 100%;
            padding: 15px;
            font-size: 1.1em;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .submit-btn:hover {
            opacity: 0.9;
        }
        
        .result-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
        }
        
        .score {
            font-size: 2.5em;
            font-weight: bold;
            color: #4CAF50;
            margin: 15px 0;
        }
        
        .admin-link {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 11px;
            color: rgba(255,255,255,0.3);
            text-decoration: none;
        }
        
        .admin-link:hover {
            color: rgba(255,255,255,0.6);
        }
        
        img {
            pointer-events: none;
        }
        
        @media (max-width: 600px) {
            .question-text {
                font-size: 1.1em;
            }
            h1 {
                font-size: 1.5em;
            }
            .option {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Опросник</h1>
        
        <div class="stats">
            Отвечено: <span id="answered-count">0</span> / <span id="total-count">0</span>
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        
        <div id="questions-container"></div>
        
        <button class="submit-btn" id="submit-btn" style="display: none;">📊 Отправить ответы</button>
        
        <div id="result-container"></div>
    </div>
    
    <a href="?admin=true" class="admin-link">🔒 Админ-панель</a>

    <script>
        // Защита от копирования
        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            return false;
        });
        
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && ['c', 'v', 'p'].includes(e.key)) {
                e.preventDefault();
                return false;
            }
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
                e.preventDefault();
                return false;
            }
        });
        
        // ========== ТВОИ ВОПРОСЫ ==========
        const questions = [
            {
                id: 1,
                text: "Какой язык программирования самый популярный?",
                image: "https://placehold.co/600x200/667eea/white?text=Python",
                options: ["Python", "JavaScript", "Java", "C++"],
                correct: 0
            },
            {
                id: 2,
                text: "Что означает HTML?",
                image: "https://placehold.co/600x200/764ba2/white?text=HTML",
                options: [
                    "Hyper Text Markup Language",
                    "High Tech Modern Language",
                    "Hyper Transfer Markup Language",
                    "Home Tool Markup Language"
                ],
                correct: 0
            },
            {
                id: 3,
                text: "Какой фреймворк для Python?",
                image: "https://placehold.co/600x200/ff6b6b/white?text=Django",
                options: ["React", "Vue.js", "Django", "Spring"],
                correct: 2
            }
        ];
        
        // Ключ для админ-панели (придумай свой секретный пароль)
        const ADMIN_PASSWORD = "мойсекретныйпароль2024";
        
        // Хранилище результатов (в localStorage)
        let results = [];
        
        // Загрузка сохраненных результатов
        function loadResults() {
            const saved = localStorage.getItem('quiz_results');
            if (saved) {
                results = JSON.parse(saved);
            }
        }
        
        // Сохранение результата
        function saveResult(resultData) {
            results.push({
                timestamp: new Date().toLocaleString('ru-RU'),
                ...resultData
            });
            localStorage.setItem('quiz_results', JSON.stringify(results));
        }
        
        // Показать админ-панель
        function showAdminPanel() {
            const password = prompt("Введите пароль администратора:");
            if (password !== ADMIN_PASSWORD) {
                alert("Неверный пароль!");
                return false;
            }
            
            loadResults();
            
            if (results.length === 0) {
                alert("Пока нет результатов");
                return;
            }
            
            // Формируем отчет
            let report = "📊 СТАТИСТИКА ОПРОСНИКА 📊\n\n";
            report += `Всего ответов: ${results.length}\n`;
            report += "=" .repeat(40) + "\n\n";
            
            results.forEach((res, idx) => {
                report += `📌 Результат #${idx + 1}\n`;
                report += `🕐 Время: ${res.timestamp}\n`;
                report += `📈 Баллы: ${res.score}/${res.total}\n`;
                report += `🎯 Процент: ${res.percentage}%\n\n`;
                report += `📝 Ответы:\n`;
                res.details.forEach((detail, qIdx) => {
                    report += `  ${qIdx + 1}. ${detail.question}\n`;
                    report += `     Ответ: ${detail.userAnswer}\n`;
                    report += `     ${detail.isCorrect ? '✅ Правильно' : '❌ Неправильно (правильно: ' + detail.correctAnswer + ')'}\n`;
                });
                report += "\n" + "-".repeat(40) + "\n\n";
            });
            
            // Создаем окно с результатами
            const adminWindow = window.open();
            adminWindow.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Админ-панель опросника</title>
                    <style>
                        body {
                            font-family: monospace;
                            padding: 20px;
                            background: #f5f5f5;
                        }
                        .result {
                            background: white;
                            border-radius: 10px;
                            padding: 15px;
                            margin-bottom: 20px;
                            border-left: 4px solid #4CAF50;
                        }
                        .result-header {
                            font-weight: bold;
                            margin-bottom: 10px;
                            color: #333;
                        }
                        .details {
                            margin-top: 10px;
                            padding-left: 20px;
                        }
                        .correct {
                            color: #4CAF50;
                        }
                        .wrong {
                            color: #f44336;
                        }
                        button {
                            background: #4CAF50;
                            color: white;
                            border: none;
                            padding: 10px 20px;
                            border-radius: 5px;
                            cursor: pointer;
                            margin: 10px 0;
                        }
                        button:hover {
                            background: #45a049;
                        }
                        hr {
                            margin: 20px 0;
                        }
                    </style>
                </head>
                <body>
                    <h1>📊 Админ-панель опросника</h1>
                    <p>Всего ответов: ${results.length}</p>
                    <button onclick="window.print()">🖨️ Распечатать</button>
                    <button onclick="copyToClipboard()">📋 Скопировать</button>
                    <hr>
                    <div id="results"></div>
                    <script>
                        const results = ${JSON.stringify(results)};
                        const container = document.getElementById('results');
                        results.forEach((res, idx) => {
                            const div = document.createElement('div');
                            div.className = 'result';
                            div.innerHTML = \`
                                <div class="result-header">
                                    🏆 Результат #\${idx + 1} | \${res.timestamp}
                                </div>
                                <div>📈 Баллы: \${res.score}/\${res.total} (\${res.percentage}%)</div>
                                <div class="details">
                                    <strong>Ответы:</strong><br>
                                    \${res.details.map((d, i) => 
                                        \`\${i + 1}. \${d.question}<br>
                                        &nbsp;&nbsp;Ответ: \${d.userAnswer}<br>
                                        &nbsp;&nbsp;<span class="\${d.isCorrect ? 'correct' : 'wrong'}">\${d.isCorrect ? '✅ Правильно' : '❌ Неправильно (правильно: ' + d.correctAnswer + ')'}</span><br>\`
                                    ).join('')}
                                </div>
                            \`;
                            container.appendChild(div);
                        });
                        
                        function copyToClipboard() {
                            const text = document.body.innerText;
                            navigator.clipboard.writeText(text);
                            alert('Скопировано в буфер обмена!');
                        }
                    <\/script>
                </body>
                </html>
            `);
        }
        
        document.getElementById('total-count').textContent = questions.length;
        let userAnswers = {};
        
        function displayQuestions() {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';
            
            questions.forEach((question, index) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                
                const text = document.createElement('div');
                text.className = 'question-text';
                text.textContent = `${index + 1}. ${question.text}`;
                card.appendChild(text);
                
                const img = document.createElement('img');
                img.className = 'question-image';
                img.src = question.image;
                img.alt = 'Изображение';
                card.appendChild(img);
                
                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options';
                
                question.options.forEach((option, optIndex) => {
                    const optionDiv = document.createElement('div');
                    optionDiv.className = 'option';
                    optionDiv.textContent = option;
                    optionDiv.onclick = () => {
                        optionsDiv.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
                        optionDiv.classList.add('selected');
                        userAnswers[question.id] = optIndex;
                        updateProgress();
                    };
                    optionsDiv.appendChild(optionDiv);
                });
                
                card.appendChild(optionsDiv);
                container.appendChild(card);
            });
        }
        
        function updateProgress() {
            const answered = Object.keys(userAnswers).length;
            const percent = (answered / questions.length) * 100;
            document.getElementById('answered-count').textContent = answered;
            document.getElementById('progress-fill').style.width = percent + '%';
            document.getElementById('submit-btn').style.display = answered === questions.length ? 'block' : 'none';
        }
        
        function calculateResults() {
            let correct = 0;
            let details = [];
            questions.forEach(q => {
                const isCorrect = userAnswers[q.id] === q.correct;
                if (isCorrect) correct++;
                details.push({
                    question: q.text,
                    userAnswer: q.options[userAnswers[q.id]] || "Не отвечен",
                    correctAnswer: q.options[q.correct],
                    isCorrect: isCorrect
                });
            });
            return { 
                correct, 
                total: questions.length, 
                percentage: (correct / questions.length * 100).toFixed(1),
                details: details,
                score: `${correct}/${questions.length}`
            };
        }
        
        async function showResults() {
            const res = calculateResults();
            
            // Сохраняем результат
            saveResult(res);
            
            // Показываем результат
            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('questions-container').style.opacity = '0.6';
            
            document.getElementById('result-container').innerHTML = `
                <div class="result-card">
                    <h2>🎉 Ваш результат 🎉</h2>
                    <div class="score">${res.correct} / ${res.total}</div>
                    <div class="percentage">${res.percentage}% правильных ответов</div>
                    <p style="margin: 15px 0; color: #4CAF50;">✅ Результат сохранен!</p>
                    <button onclick="location.reload()" style="margin-top:20px;padding:10px 20px;background:#4CAF50;color:white;border:none;border-radius:5px;cursor:pointer;">🔄 Пройти снова</button>
                </div>
            `;
        }
        
        document.getElementById('submit-btn').onclick = () => {
            if (Object.keys(userAnswers).length !== questions.length) {
                alert('Ответьте на все вопросы!');
                return;
            }
            showResults();
        };
        
        // Проверяем, не зашли ли в админ-панель
        if (window.location.search.includes('admin=true')) {
            showAdminPanel();
        }
        
        displayQuestions();
        loadResults();
    </script>
</body>
</html>
